<svg xmlns="http://www.w3.org/2000/svg" width="200" height="64" viewBox="0 0 200 64" role="img" aria-labelledby="title">
  <title>Rolex Wordmark</title>
  <defs>
    <linearGradient id="rolexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3d2e" />
      <stop offset="100%" stop-color="#1d6a4e" />
    </linearGradient>
  </defs>
  <rect width="200" height="64" rx="12" fill="url(#rolexGradient)" />
  <text x="100" y="40" font-family="'Cinzel', 'Times New Roman', serif" font-weight="600" font-size="30" fill="#f1f5f2" text-anchor="middle" letter-spacing="4">
    ROLEX
  </text>
</svg>
